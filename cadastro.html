<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inscrição para Evento</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74c0fc, #4dabf7, #228be6);
            margin: 0;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, #1c7ed6, #1864ab);
            color: white;
            padding: 30px;
            text-align: center;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 500px;
            background: white;
            margin: 40px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #228be6;
            outline: none;
            box-shadow: 0 0 5px rgba(34,139,230,0.5);
        }

        .inline {
            margin-top: 10px;
            color: #444;
        }

        .inline input {
            width: auto;
            margin-right: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #228be6, #1c7ed6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #1c7ed6, #1864ab);
            transform: translateY(-1px);
        }

        .btn-voltar {
            display: block;
            text-align: center;
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            background: #dee2e6;
            color: #333;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-voltar:hover {
            background: #ced4da;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Inscrição para o Evento</h1>
        <p>23/07/2026 - Teatro Colégio Londrinense - Londrina/PR</p>
    </div>

    <div class="container">
        <form action="https://formspree.io/f/mbdwraev" method="POST"

            <label>Nome completo:</label>
            <input type="text" name="nome" required>

            <label>E-mail:</label>
            <input type="email" name="email" required>

            <label>Telefone:</label>
            <input type="tel" name="telefone">

            <label>Data de nascimento:</label>
            <input type="date" name="nascimento">

            <label>Área de atuação:</label>
            <select name="area">
                <option>Estudante</option>
                <option>Desenvolvedor</option>
                <option>Profissional de TI</option>
                <option>Empreendedor</option>
                <option>Outro</option>
            </select>

            <label>Qual atividade você tem mais interesse?</label>
            <div class="inline">
                <input type="radio" name="interesse"> Palestras sobre Inteligência Artificial
            </div>
            <div class="inline">
                <input type="radio" name="interesse"> Workshop de Desenvolvimento Mobile
            </div>
            <div class="inline">
                <input type="radio" name="interesse"> Ambos
            </div>

            <label>Como ficou sabendo do evento?</label>
            <div class="inline">
                <input type="checkbox"> Instagram
            </div>
            <div class="inline">
                <input type="checkbox"> Faculdade / Escola
            </div>
            <div class="inline">
                <input type="checkbox"> Amigos
            </div>
            <div class="inline">
                <input type="checkbox"> Internet
            </div>
            <div class="inline">
            <input type="checkbox" id="outrosCheck" onclick="toggleOutros()"> Outros 
            </div>

            <input type="text" id="campoOutros" placeholder="Digite aqui..." disabled>

        
           



            <label>Observações ou expectativas:</label>
            <textarea rows="4"></textarea>

            <button type="submit">Confirmar inscrição</button>

            <!-- Botão de voltar -->
            <a href="index.html" class="btn-voltar">Voltar para a página inicial</a>

        </form>
    </div>

</body>
</html>
